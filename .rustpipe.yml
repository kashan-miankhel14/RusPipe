name: my-pipeline
trigger:
  branches: [main, develop]
  events: [push, pull_request]

stages:
  lint:
    runs-on: rust:latest
    steps:
      - name: Run clippy
        run: cargo clippy -- -D warnings

  test:
    runs-on: rust:latest
    needs: [lint]
    steps:
      - name: Run tests
        run: cargo test --all

  build:
    runs-on: rust:latest
    needs: [test]
    steps:
      - name: Build release
        run: cargo build --release
        artifact: app-binary
